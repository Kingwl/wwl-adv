name: Deploy Web

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

env:
  GODOT_VERSION: 4.6.2
  EXPORT_PRESET: Web
  EXPORT_DIR: build/web
  UI_FONT_SOURCE_URL: https://raw.githubusercontent.com/notofonts/noto-cjk/main/Sans/OTF/SimplifiedChinese/NotoSansCJKsc-Regular.otf

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Cache Godot
        uses: actions/cache@v4
        with:
          path: |
            ~/godot
            ~/.local/share/godot/export_templates/${{ env.GODOT_VERSION }}.stable
          key: godot-${{ runner.os }}-${{ env.GODOT_VERSION }}

      - name: Install Godot editor
        run: |
          set -euo pipefail
          GODOT_DIR="$HOME/godot"
          GODOT_BIN="$GODOT_DIR/godot"
          mkdir -p "$GODOT_DIR"

          if [ ! -x "$GODOT_BIN" ]; then
            ZIP="$RUNNER_TEMP/godot.zip"
            curl -L \
              "https://github.com/godotengine/godot/releases/download/${GODOT_VERSION}-stable/Godot_v${GODOT_VERSION}-stable_linux.x86_64.zip" \
              -o "$ZIP"
            unzip -q "$ZIP" -d "$RUNNER_TEMP/godot"
            mv "$RUNNER_TEMP/godot/Godot_v${GODOT_VERSION}-stable_linux.x86_64" "$GODOT_BIN"
            chmod +x "$GODOT_BIN"
          fi

          echo "GODOT_BIN=$GODOT_BIN" >> "$GITHUB_ENV"

      - name: Install Godot export templates
        run: |
          set -euo pipefail
          TEMPLATE_DIR="$HOME/.local/share/godot/export_templates/${GODOT_VERSION}.stable"
          mkdir -p "$TEMPLATE_DIR"

          if [ ! -f "$TEMPLATE_DIR/web_release.zip" ]; then
            TPZ="$RUNNER_TEMP/export_templates.tpz"
            curl -L \
              "https://github.com/godotengine/godot/releases/download/${GODOT_VERSION}-stable/Godot_v${GODOT_VERSION}-stable_export_templates.tpz" \
              -o "$TPZ"
            unzip -q "$TPZ" -d "$RUNNER_TEMP/export_templates"
            cp "$RUNNER_TEMP/export_templates/templates/"* "$TEMPLATE_DIR/"
          fi

      - name: Prepare export preset
        run: cp ci/export_presets.web.cfg export_presets.cfg

      - name: Rebuild UI font subset
        run: |
          set -euo pipefail
          python3 -m venv "$RUNNER_TEMP/fonttools-venv"
          "$RUNNER_TEMP/fonttools-venv/bin/python" -m pip install --upgrade pip
          "$RUNNER_TEMP/fonttools-venv/bin/python" -m pip install fonttools
          mkdir -p "$RUNNER_TEMP/fonts"
          SOURCE_FONT="$RUNNER_TEMP/fonts/NotoSansCJKsc-Regular.otf"
          curl -L --fail "$UI_FONT_SOURCE_URL" -o "$SOURCE_FONT"
          "$RUNNER_TEMP/fonttools-venv/bin/python" tools/subset_ui_font.py \
            --source "$SOURCE_FONT" \
            --output assets/fonts/NotoSansCJKsc-WWL-Subset.otf

      - name: Import Godot assets
        run: '"$GODOT_BIN" --headless --path . --import'

      - name: Run integration tests
        run: GODOT_BIN="$GODOT_BIN" ./tests/run_tests.sh

      - name: Export Web build
        run: |
          set -euo pipefail
          rm -rf "$EXPORT_DIR"
          mkdir -p "$EXPORT_DIR"
          "$GODOT_BIN" --headless --path . --export-release "$EXPORT_PRESET" "$EXPORT_DIR/index.html"
          touch "$EXPORT_DIR/.nojekyll"
          test -f "$EXPORT_DIR/index.html"
          test -f "$EXPORT_DIR/index.wasm"
          test -f "$EXPORT_DIR/index.pck"
          du -sh "$EXPORT_DIR"

      - name: Configure Sentry browser monitoring
        env:
          SENTRY_DSN: ${{ secrets.SENTRY_DSN }}
          SENTRY_ENVIRONMENT: production
          SENTRY_RELEASE: wwl-adventure@${{ github.sha }}
        run: |
          set -euo pipefail
          if [ -z "${SENTRY_DSN:-}" ]; then
            echo "SENTRY_DSN secret is not configured; Sentry browser monitoring remains disabled."
            exit 0
          fi
          python3 tools/configure_sentry_web.py \
            --html "$EXPORT_DIR/index.html" \
            --dsn "$SENTRY_DSN" \
            --environment "$SENTRY_ENVIRONMENT" \
            --release "$SENTRY_RELEASE"
          if find "$EXPORT_DIR" -maxdepth 1 \( -name '*.side.wasm' -o -name 'libsentry.web*.wasm' \) | grep -q .; then
            echo "Unexpected Web GDExtension module in export output." >&2
            exit 1
          fi
          if grep -q '"gdextensionLibs":\[[^]]\+\]' "$EXPORT_DIR/index.html"; then
            echo "Unexpected Web GDExtension library config in index.html." >&2
            exit 1
          fi
          if grep -q 'loadDylibs' "$EXPORT_DIR/index.js"; then
            echo "Unexpected Web dynamic-link template in index.js." >&2
            exit 1
          fi

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v5

      - name: Upload GitHub Pages artifact
        uses: actions/upload-pages-artifact@v4
        with:
          path: ${{ env.EXPORT_DIR }}

  deploy:
    runs-on: ubuntu-latest
    needs: build

    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
